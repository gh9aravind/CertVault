<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>CertVault — Personal Document Locker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
  :root{
    --void:#0E1220;
    --panel:#161C33;
    --panel-2:#1D2440;
    --line:#2A3155;
    --brass:#C9A227;
    --brass-soft:#E8C766;
    --ink:#EDE9DC;
    --muted:#8A90AC;
    --danger:#C1543C;
    --success:#6FA287;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at top, #161B32 0%, var(--void) 55%);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .ml{font-family:'Noto Sans Malayalam','Inter',sans-serif;}
  .serif{font-family:'Fraunces',serif;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--brass);color:#1a1a1a;}

  /* ---------- Seal Emblem (signature element) ---------- */
  .seal{
    width:96px;height:96px;position:relative;margin:0 auto;
  }
  .seal svg{width:100%;height:100%;display:block;}
  .seal-ring{
    fill:none;stroke:var(--line);stroke-width:1.5;
    transition:stroke 0.6s ease;
  }
  .seal.unlocked .seal-ring{stroke:var(--brass);}
  .seal-core{
    fill:var(--panel-2);stroke:var(--muted);stroke-width:1.2;
    transition:fill 0.6s ease, stroke 0.6s ease;
  }
  .seal.unlocked .seal-core{fill:var(--brass);stroke:var(--brass-soft);}
  .seal-mark{
    stroke:var(--muted);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;
    transition:stroke 0.6s ease, opacity 0.4s ease;
  }
  .seal.unlocked .seal-mark{stroke:#161C33;}
  .seal-spin{transform-origin:48px 48px;animation:spin 20s linear infinite;}
  .seal.unlocked .seal-spin{animation-duration:2.5s;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  /* ---------- Login Screen ---------- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px 20px;
  }
  .login-card{
    width:100%;max-width:380px;text-align:center;
  }
  .brand-title{
    font-size:2.1rem;font-weight:600;letter-spacing:0.01em;margin:20px 0 4px;
  }
  .brand-sub{
    color:var(--muted);font-size:0.98rem;margin:0 0 32px;
  }
  .field-label{
    display:block;text-align:left;font-size:0.78rem;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--muted);margin:0 0 8px;
  }
  .code-input{
    width:100%;padding:15px 16px;border-radius:12px;
    background:var(--panel);border:1px solid var(--line);
    color:var(--ink);font-size:1.05rem;letter-spacing:0.05em;
    outline:none;transition:border-color 0.2s ease;
  }
  .code-input:focus{border-color:var(--brass);}
  .recaptcha-wrap{margin:18px 0;display:flex;justify-content:center;transform:scale(0.98);}
  .unlock-btn{
    width:100%;padding:15px;border:none;border-radius:12px;
    background:var(--brass);color:#161226;font-weight:600;font-size:1rem;
    letter-spacing:0.02em;margin-top:6px;
    transition:background 0.2s ease, transform 0.1s ease;
  }
  .unlock-btn:active{transform:scale(0.98);}
  .unlock-btn:disabled{background:#3A3F58;color:var(--muted);cursor:not-allowed;}
  .login-msg{
    min-height:20px;font-size:0.86rem;margin-top:14px;color:var(--danger);
  }
  .login-msg.ok{color:var(--success);}
  .footer-note{margin-top:40px;color:#565C7A;font-size:0.78rem;}

  /* ---------- Dashboard ---------- */
  #dashScreen{display:none;min-height:100vh;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(14,18,32,0.92);backdrop-filter:blur(10px);
    z-index:10;
  }
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-brand .seal{width:36px;height:36px;}
  .topbar-brand span{font-weight:600;font-size:1.05rem;}
  .logout-btn{
    background:none;border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;border-radius:9px;font-size:0.85rem;
  }
  .logout-btn:active{background:var(--panel);}

  .content{padding:20px 20px 100px;max-width:820px;margin:0 auto;}

  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;}
  .chip{
    flex:0 0 auto;padding:8px 15px;border-radius:20px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);font-size:0.85rem;white-space:nowrap;
  }
  .chip.active{background:var(--brass);border-color:var(--brass);color:#161226;font-weight:600;}

  .doc-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:560px){.doc-grid{grid-template-columns:1fr 1fr;}}

  .doc-card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;display:flex;flex-direction:column;gap:10px;
  }
  .doc-top{display:flex;align-items:flex-start;gap:12px;}
  .doc-icon{
    width:42px;height:42px;flex:0 0 42px;border-radius:10px;background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;color:var(--brass-soft);font-size:1.2rem;
  }
  .doc-info{flex:1;min-width:0;}
  .doc-name{font-weight:600;font-size:0.96rem;word-break:break-word;}
  .doc-meta{color:var(--muted);font-size:0.78rem;margin-top:2px;}
  .doc-cat{
    display:inline-block;margin-top:6px;font-size:0.72rem;color:var(--brass-soft);
    border:1px solid #4A3F1F;background:#221D0F;padding:2px 9px;border-radius:8px;
  }
  .doc-actions{display:flex;gap:8px;margin-top:2px;}
  .doc-actions button{
    flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--ink);font-size:0.82rem;
  }
  .doc-actions button.danger{color:var(--danger);border-color:#3D2320;}
  .doc-actions button:active{opacity:0.7;}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--muted);
  }
  .empty-state .seal{width:60px;height:60px;opacity:0.5;margin-bottom:16px;}

  .fab{
    position:fixed;right:20px;bottom:24px;width:58px;height:58px;border-radius:50%;
    background:var(--brass);border:none;color:#161226;font-size:1.7rem;font-weight:600;
    box-shadow:0 8px 24px rgba(201,162,39,0.35);z-index:20;
  }
  .fab:active{transform:scale(0.95);}

  /* ---------- Upload Modal ---------- */
  .modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(9,11,20,0.75);
    z-index:30;align-items:flex-end;justify-content:center;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--panel);width:100%;max-width:480px;border-radius:20px 20px 0 0;
    padding:24px 20px 28px;border-top:1px solid var(--line);
  }
  .modal h3{margin:0 0 18px;font-family:'Fraunces',serif;font-weight:600;}
  .modal label{display:block;font-size:0.78rem;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.05em;}
  .modal input[type=text], .modal select{
    width:100%;padding:12px 14px;border-radius:10px;background:var(--panel-2);
    border:1px solid var(--line);color:var(--ink);font-size:0.95rem;outline:none;
  }
  .file-drop{
    margin-top:14px;border:1.5px dashed var(--line);border-radius:12px;padding:20px;
    text-align:center;color:var(--muted);font-size:0.88rem;
  }
  .file-drop.has-file{border-color:var(--brass);color:var(--ink);}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .modal-actions button{flex:1;padding:13px;border-radius:10px;border:none;font-weight:600;font-size:0.92rem;}
  .btn-cancel{background:var(--panel-2);color:var(--muted);}
  .btn-save{background:var(--brass);color:#161226;}
  .btn-save:disabled{background:#3A3F58;color:var(--muted);}
  .modal-msg{min-height:18px;font-size:0.82rem;margin-top:10px;color:var(--danger);}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="seal" id="loginSeal">
      <svg viewBox="0 0 96 96">
        <g class="seal-spin">
          <circle class="seal-ring" cx="48" cy="48" r="44"/>
          <circle class="seal-ring" cx="48" cy="48" r="38" stroke-dasharray="3 6"/>
        </g>
        <circle class="seal-core" cx="48" cy="48" r="28"/>
        <path class="seal-mark" d="M40 47 v-6 a8 8 0 0 1 16 0 v6 M37 47 h22 v16 h-22 z"/>
      </svg>
    </div>
    <h1 class="brand-title serif">CertVault</h1>
    <p class="brand-sub ml">നിന്റെ സ്വകാര്യ സർട്ടിഫിക്കറ്റ് ലോക്കർ</p>

    <label class="field-label">Secret Code</label>
    <input type="password" id="secretCode" class="code-input" placeholder="●●●●●●●●" autocomplete="off">

    <div class="recaptcha-wrap">
      <div class="g-recaptcha" data-sitekey="6LdfkUAtAAAAALkBMd_WQGu6LgK2wP1849Oiz3iL"></div>
    </div>

    <button class="unlock-btn" id="unlockBtn">Unlock Vault</button>
    <div class="login-msg" id="loginMsg"></div>
    <p class="footer-note">Private access only</p>
  </div>
</div>

<!-- ============ DASHBOARD SCREEN ============ -->
<div id="dashScreen">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="seal unlocked"><svg viewBox="0 0 96 96">
        <circle class="seal-ring" cx="48" cy="48" r="44"/>
        <circle class="seal-core" cx="48" cy="48" r="28"/>
        <path class="seal-mark" d="M40 47 v-6 a8 8 0 0 1 16 0 v6 M37 47 h22 v16 h-22 z"/>
      </svg></div>
      <span class="serif">CertVault</span>
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <div class="content">
    <div class="chips" id="chips">
      <div class="chip active" data-cat="All">All</div>
      <div class="chip" data-cat="SSLC">SSLC</div>
      <div class="chip" data-cat="Plus Two">Plus Two</div>
      <div class="chip" data-cat="Degree">Degree</div>
      <div class="chip" data-cat="ID Proof">ID Proof</div>
      <div class="chip" data-cat="Other">Other</div>
    </div>

    <div class="doc-grid" id="docGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="seal"><svg viewBox="0 0 96 96">
        <circle class="seal-ring" cx="48" cy="48" r="44"/>
        <circle class="seal-core" cx="48" cy="48" r="28"/>
        <path class="seal-mark" d="M40 47 v-6 a8 8 0 0 1 16 0 v6 M37 47 h22 v16 h-22 z"/>
      </svg></div>
      <p>No documents yet.<br>Tap + to add your first certificate.</p>
    </div>
  </div>

  <button class="fab" id="fabAdd">+</button>
</div>

<!-- ============ UPLOAD MODAL ============ -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h3>Add Document</h3>
    <label>Name</label>
    <input type="text" id="docName" placeholder="e.g. SSLC Marksheet">
    <label>Category</label>
    <select id="docCat">
      <option>SSLC</option>
      <option>Plus Two</option>
      <option>Degree</option>
      <option>ID Proof</option>
      <option>Other</option>
    </select>
    <label>File</label>
    <div class="file-drop" id="fileDrop">Tap to choose a PDF or image (max 10MB)</div>
    <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelUpload">Cancel</button>
      <button class="btn-save" id="saveUpload">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://ourvffmmahggqxfbuxlo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6DyIU5rOoWiGYt6hQDDjTw_JLSxKC2w';
const LOGIN_EMAIL  = 'aravind.certvault@gmail.com'; // matches the Supabase auth user created

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET = 'documents';

// ---------- Elements ----------
const loginScreen = document.getElementById('loginScreen');
const dashScreen  = document.getElementById('dashScreen');
const secretCode  = document.getElementById('secretCode');
const unlockBtn   = document.getElementById('unlockBtn');
const loginMsg    = document.getElementById('loginMsg');
const loginSeal   = document.getElementById('loginSeal');
const docGrid     = document.getElementById('docGrid');
const emptyState  = document.getElementById('emptyState');
const chips       = document.querySelectorAll('.chip');
const fab         = document.getElementById('fabAdd');
const modal       = document.getElementById('uploadModal');
const fileDrop    = document.getElementById('fileDrop');
const fileInput   = document.getElementById('fileInput');
const saveUpload  = document.getElementById('saveUpload');
const cancelUpload= document.getElementById('cancelUpload');
const modalMsg    = document.getElementById('modalMsg');
const docNameEl   = document.getElementById('docName');
const docCatEl    = document.getElementById('docCat');
const logoutBtn   = document.getElementById('logoutBtn');

let activeCat = 'All';
let allDocs = [];
let chosenFile = null;

// ---------- Brute-force lockout (client-side UX layer) ----------
const LOCK_KEY = 'cv_lock_until';
const FAIL_KEY = 'cv_fail_count';
function isLocked(){
  const until = parseInt(localStorage.getItem(LOCK_KEY) || '0', 10);
  return Date.now() < until;
}
function remainingLockMins(){
  const until = parseInt(localStorage.getItem(LOCK_KEY) || '0', 10);
  return Math.ceil((until - Date.now()) / 60000);
}
function registerFail(){
  const n = parseInt(localStorage.getItem(FAIL_KEY) || '0', 10) + 1;
  localStorage.setItem(FAIL_KEY, n);
  if(n >= 5){
    localStorage.setItem(LOCK_KEY, Date.now() + 15*60*1000);
    localStorage.setItem(FAIL_KEY, '0');
  }
}
function clearFails(){
  localStorage.setItem(FAIL_KEY, '0');
  localStorage.removeItem(LOCK_KEY);
}

function checkLockUI(){
  if(isLocked()){
    unlockBtn.disabled = true;
    loginMsg.textContent = `വളരെ പല തവണ തെറ്റായ ശ്രമം. ${remainingLockMins()} മിനിറ്റ് കഴിഞ്ഞ് ശ്രമിക്കുക.`;
  }
}
checkLockUI();
setInterval(checkLockUI, 15000);

// ---------- Login ----------
unlockBtn.addEventListener('click', async () => {
  loginMsg.className = 'login-msg';
  if(isLocked()){ checkLockUI(); return; }

  const code = secretCode.value.trim();
  if(!code){ loginMsg.textContent = 'Secret code enter ചെയ്യുക.'; return; }

  const captchaResp = (typeof grecaptcha !== 'undefined') ? grecaptcha.getResponse() : '';
  if(!captchaResp){ loginMsg.textContent = 'reCAPTCHA verify ചെയ്യുക.'; return; }

  unlockBtn.disabled = true;
  unlockBtn.textContent = 'Verifying...';

  const { data, error } = await sb.auth.signInWithPassword({ email: LOGIN_EMAIL, password: code });

  unlockBtn.disabled = false;
  unlockBtn.textContent = 'Unlock Vault';

  if(error){
    registerFail();
    if(typeof grecaptcha !== 'undefined') grecaptcha.reset();
    loginMsg.textContent = 'തെറ്റായ code. വീണ്ടും ശ്രമിക്കുക.';
    checkLockUI();
    return;
  }

  clearFails();
  loginMsg.className = 'login-msg ok';
  loginMsg.textContent = 'Unlocked!';
  loginSeal.classList.add('unlocked');
  setTimeout(showDashboard, 500);
});

secretCode.addEventListener('keydown', (e) => { if(e.key === 'Enter') unlockBtn.click(); });

// ---------- Session check on load ----------
async function initSession(){
  const { data } = await sb.auth.getSession();
  if(data.session){ showDashboard(); }
}
initSession();

// ---------- Dashboard ----------
async function showDashboard(){
  loginScreen.style.display = 'none';
  dashScreen.style.display = 'block';
  await loadDocs();
}

logoutBtn.addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function loadDocs(){
  const { data, error } = await sb.from('documents').select('*').order('uploaded_at', { ascending: false });
  if(error){ console.error(error); return; }
  allDocs = data || [];
  renderDocs();
}

function renderDocs(){
  const filtered = activeCat === 'All' ? allDocs : allDocs.filter(d => d.category === activeCat);
  docGrid.innerHTML = '';
  emptyState.style.display = filtered.length ? 'none' : 'block';

  filtered.forEach(doc => {
    const isPdf = doc.file_path.toLowerCase().endsWith('.pdf');
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.innerHTML = `
      <div class="doc-top">
        <div class="doc-icon">${isPdf ? '📄' : '🖼️'}</div>
        <div class="doc-info">
          <div class="doc-name">${escapeHtml(doc.name)}</div>
          <div class="doc-meta">${new Date(doc.uploaded_at).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</div>
          <span class="doc-cat">${escapeHtml(doc.category)}</span>
        </div>
      </div>
      <div class="doc-actions">
        <button class="view-btn">View</button>
        <button class="danger del-btn">Delete</button>
      </div>
    `;
    card.querySelector('.view-btn').addEventListener('click', () => viewDoc(doc));
    card.querySelector('.del-btn').addEventListener('click', () => deleteDoc(doc));
    docGrid.appendChild(card);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCat = chip.dataset.cat;
    renderDocs();
  });
});

async function viewDoc(doc){
  const { data, error } = await sb.storage.from(BUCKET).createSignedUrl(doc.file_path, 60);
  if(error){ alert('File open ചെയ്യാൻ പറ്റിയില്ല.'); return; }
  window.open(data.signedUrl, '_blank');
}

async function deleteDoc(doc){
  if(!confirm(`"${doc.name}" ഡിലീറ്റ് ചെയ്യണോ?`)) return;
  await sb.storage.from(BUCKET).remove([doc.file_path]);
  await sb.from('documents').delete().eq('id', doc.id);
  await loadDocs();
}

// ---------- Upload Modal ----------
fab.addEventListener('click', () => {
  docNameEl.value = '';
  docCatEl.value = 'SSLC';
  chosenFile = null;
  fileDrop.textContent = 'Tap to choose a PDF or image (max 10MB)';
  fileDrop.classList.remove('has-file');
  modalMsg.textContent = '';
  modal.classList.add('open');
});
cancelUpload.addEventListener('click', () => modal.classList.remove('open'));

fileDrop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if(!f) return;
  if(f.size > 10 * 1024 * 1024){ modalMsg.textContent = 'File 10MB-ൽ താഴെ ആയിരിക്കണം.'; return; }
  chosenFile = f;
  fileDrop.textContent = f.name;
  fileDrop.classList.add('has-file');
  modalMsg.textContent = '';
});

saveUpload.addEventListener('click', async () => {
  const name = docNameEl.value.trim();
  const category = docCatEl.value;
  if(!name){ modalMsg.textContent = 'Document name enter ചെയ്യുക.'; return; }
  if(!chosenFile){ modalMsg.textContent = 'ഒരു file select ചെയ്യുക.'; return; }

  saveUpload.disabled = true;
  saveUpload.textContent = 'Uploading...';

  const ext = chosenFile.name.split('.').pop();
  const path = `${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;

  const { error: upErr } = await sb.storage.from(BUCKET).upload(path, chosenFile);
  if(upErr){
    modalMsg.textContent = 'Upload പരാജയപ്പെട്ടു.';
    saveUpload.disabled = false;
    saveUpload.textContent = 'Save';
    return;
  }

  const { error: insErr } = await sb.from('documents').insert({ name, category, file_path: path });
  saveUpload.disabled = false;
  saveUpload.textContent = 'Save';

  if(insErr){
    modalMsg.textContent = 'Save പരാജയപ്പെട്ടു.';
    return;
  }

  modal.classList.remove('open');
  await loadDocs();
});
</script>
</body>
</html>
