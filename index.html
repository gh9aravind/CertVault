<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>CertVault — Personal Document Locker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
  :root{
    --void:#05060F;
    --violet:#7B4DFF;
    --cyan:#33D6E8;
    --magenta:#D24FE0;
    --deepblue:#1B2A6B;
    --glass:rgba(255,255,255,0.07);
    --glass-2:rgba(255,255,255,0.12);
    --border:rgba(255,255,255,0.20);
    --ink:#F3F1FF;
    --muted:rgba(243,241,255,0.58);
    --gold-a:#F6D368;
    --gold-b:#C9962B;
    --danger:#FF8080;
    --success:#5FE0B6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--void);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .ml{font-family:'Noto Sans Malayalam','Inter',sans-serif;}
  .serif{font-family:'Fraunces',serif;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--gold-a);color:#1a1a1a;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  /* ---------- Login background (bold, one signature moment) ---------- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px 20px;position:relative;overflow:hidden;
  }
  .mesh{position:absolute;inset:-10%;z-index:0;filter:blur(60px) saturate(140%);}
  .mesh div{position:absolute;border-radius:50%;opacity:0.75;}
  .mesh .b1{width:60vh;height:60vh;background:var(--violet);top:-10%;left:-15%;animation:drift1 22s ease-in-out infinite alternate;}
  .mesh .b2{width:55vh;height:55vh;background:var(--cyan);bottom:-15%;right:-10%;animation:drift2 26s ease-in-out infinite alternate;}
  .mesh .b3{width:45vh;height:45vh;background:var(--magenta);top:35%;right:5%;animation:drift3 19s ease-in-out infinite alternate;}
  .mesh .b4{width:50vh;height:50vh;background:var(--deepblue);bottom:10%;left:10%;animation:drift1 30s ease-in-out infinite alternate-reverse;}
  @keyframes drift1{from{transform:translate(0,0);}to{transform:translate(6%,8%);}}
  @keyframes drift2{from{transform:translate(0,0);}to{transform:translate(-8%,-5%);}}
  @keyframes drift3{from{transform:translate(0,0);}to{transform:translate(-5%,7%);}}

  .login-card{
    position:relative;z-index:1;width:100%;max-width:380px;text-align:center;
    background:linear-gradient(155deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));
    border:1px solid rgba(255,255,255,0.30);
    border-radius:26px;padding:36px 26px 30px;
    backdrop-filter:blur(22px) saturate(160%);
    box-shadow:0 30px 70px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
  }

  /* ---------- Glass lock (signature element) ---------- */
  .lockwrap{width:88px;height:88px;margin:0 auto 6px;position:relative;}
  .lockwrap svg{width:100%;height:100%;display:block;filter:drop-shadow(0 8px 18px rgba(123,77,255,0.45));}
  .ring-spin{transform-origin:48px 48px;animation:spin 24s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .lockwrap.unlocked .shackle{transform:translateY(-6px) rotate(-8deg);transform-origin:48px 40px;}
  .shackle{transition:transform 0.5s cubic-bezier(.34,1.56,.64,1);}

  .brand-title{font-size:2.15rem;font-weight:600;letter-spacing:0.01em;margin:16px 0 4px;
    background:linear-gradient(135deg,#fff,#cfd4ff 60%,#a9b3ff);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand-sub{color:rgba(243,241,255,0.75);font-size:0.95rem;margin:0 0 30px;}

  .field-label{display:block;text-align:left;font-size:0.76rem;letter-spacing:0.07em;
    text-transform:uppercase;color:var(--muted);margin:0 0 8px;}
  .code-input{
    width:100%;padding:15px 16px;border-radius:14px;
    background:rgba(255,255,255,0.08);border:1px solid var(--border);
    color:var(--ink);font-size:1.05rem;letter-spacing:0.06em;outline:none;
    transition:border-color 0.2s ease,background 0.2s ease;
  }
  .code-input:focus{border-color:var(--cyan);background:rgba(255,255,255,0.13);}
  .recaptcha-wrap{margin:18px 0;display:flex;justify-content:center;transform:scale(0.98);border-radius:10px;overflow:hidden;}
  .unlock-btn{
    width:100%;padding:15px;border:none;border-radius:14px;
    background:linear-gradient(135deg,var(--gold-a),var(--gold-b));
    color:#2A1E00;font-weight:700;font-size:1rem;letter-spacing:0.02em;margin-top:6px;
    box-shadow:0 10px 26px rgba(201,150,43,0.4);
    transition:transform 0.1s ease,filter 0.2s ease;
  }
  .unlock-btn:active{transform:scale(0.98);}
  .unlock-btn:disabled{background:#4a4a58;color:#9a9aab;box-shadow:none;}
  .login-msg{min-height:20px;font-size:0.85rem;margin-top:14px;color:var(--danger);}
  .login-msg.ok{color:var(--success);}
  .footer-note{margin-top:34px;color:rgba(243,241,255,0.4);font-size:0.78rem;}

  /* ---------- Dashboard (calm, readable) ---------- */
  #dashScreen{display:none;min-height:100vh;
    background:radial-gradient(ellipse 120% 60% at 50% -10%, #241645 0%, var(--void) 55%);}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.10);
    position:sticky;top:0;background:rgba(5,6,15,0.85);backdrop-filter:blur(14px);z-index:10;
  }
  .topbar-brand{display:flex;align-items:center;gap:11px;}
  .vault-icon{width:34px;height:34px;border-radius:9px;
    background:linear-gradient(140deg,var(--violet),var(--cyan) 60%,var(--magenta));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(123,77,255,0.5);}
  .vault-icon svg{width:18px;height:18px;}
  .topbar-brand span{font-weight:600;font-size:1.05rem;}
  .logout-btn{background:var(--glass);border:1px solid var(--border);color:var(--muted);
    padding:8px 14px;border-radius:10px;font-size:0.85rem;}
  .logout-btn:active{background:var(--glass-2);}

  .content{padding:20px 20px 100px;max-width:860px;margin:0 auto;}

  .section-label{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin:4px 0 12px;}

  .people-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:22px;}
  .person-card{
    flex:0 0 auto;width:112px;padding:16px 10px;border-radius:16px;text-align:center;
    background:var(--glass);border:1.5px solid var(--border);
  }
  .person-card.active{border-color:var(--cyan);
    box-shadow:0 0 0 1px var(--cyan), 0 0 22px rgba(51,214,232,0.35);
    background:linear-gradient(160deg, rgba(51,214,232,0.14), rgba(210,79,224,0.10));}
  .avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;
    background:linear-gradient(140deg,#3a3f66,#23274a);
    display:flex;align-items:center;justify-content:center;color:rgba(243,241,255,0.7);}
  .person-card .pname{font-size:0.82rem;font-weight:600;line-height:1.2;word-break:break-word;}
  .person-card .pcount{font-size:0.72rem;color:var(--muted);margin-top:3px;}
  .person-card.add-card{display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-style:dashed;color:var(--muted);}
  .person-card.add-card .plus{font-size:1.5rem;color:var(--cyan);margin-bottom:2px;}

  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;}
  .chip{flex:0 0 auto;padding:8px 15px;border-radius:20px;border:1px solid var(--border);
    background:var(--glass);color:var(--muted);font-size:0.85rem;white-space:nowrap;}
  .chip.active{background:linear-gradient(135deg,var(--gold-a),var(--gold-b));border-color:transparent;color:#2A1E00;font-weight:600;}

  .doc-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:560px){.doc-grid{grid-template-columns:1fr 1fr;}}

  .doc-card{background:var(--glass);border:1px solid var(--border);border-radius:16px;
    padding:16px;display:flex;flex-direction:column;gap:10px;}
  .doc-top{display:flex;align-items:flex-start;gap:12px;}
  .file-badge{width:42px;height:42px;flex:0 0 42px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  .file-badge.pdf{background:linear-gradient(150deg,#FF6B7A,#B3204F);}
  .file-badge.img{background:linear-gradient(150deg,#6DA6FF,#7B4DFF);}
  .file-badge svg{width:22px;height:22px;}
  .doc-info{flex:1;min-width:0;}
  .doc-name{font-weight:600;font-size:0.96rem;word-break:break-word;}
  .doc-meta{color:var(--muted);font-size:0.78rem;margin-top:2px;}
  .doc-cat{display:inline-block;margin-top:6px;font-size:0.72rem;color:#FFE8A3;
    border:1px solid rgba(246,211,104,0.35);background:rgba(246,211,104,0.10);padding:2px 9px;border-radius:8px;}
  .doc-actions{display:flex;gap:8px;margin-top:2px;}
  .doc-actions button{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);
    background:rgba(255,255,255,0.05);color:var(--ink);font-size:0.82rem;}
  .doc-actions button.danger{color:var(--danger);border-color:rgba(255,128,128,0.3);}
  .doc-actions button:active{opacity:0.7;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .lockwrap{width:56px;height:56px;opacity:0.55;margin-bottom:16px;}

  .fab{position:fixed;right:20px;bottom:24px;width:58px;height:58px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold-a),var(--gold-b));border:none;color:#2A1E00;
    font-size:1.7rem;font-weight:600;box-shadow:0 10px 28px rgba(201,150,43,0.45);z-index:20;}
  .fab:active{transform:scale(0.95);}

  /* ---------- Modals ---------- */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,6,15,0.78);
    z-index:30;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#12142A;width:100%;max-width:480px;border-radius:22px 22px 0 0;
    padding:24px 20px 28px;border-top:1px solid var(--border);}
  .modal h3{margin:0 0 18px;font-family:'Fraunces',serif;font-weight:600;}
  .modal label{display:block;font-size:0.76rem;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.05em;}
  .modal input[type=text], .modal select{width:100%;padding:12px 14px;border-radius:11px;
    background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--ink);font-size:0.95rem;outline:none;}
  .file-drop{margin-top:14px;border:1.5px dashed var(--border);border-radius:14px;padding:20px;
    text-align:center;color:var(--muted);font-size:0.88rem;}
  .file-drop.has-file{border-color:var(--cyan);color:var(--ink);}
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .modal-actions button{flex:1;padding:13px;border-radius:11px;border:none;font-weight:600;font-size:0.92rem;}
  .btn-cancel{background:rgba(255,255,255,0.07);color:var(--muted);}
  .btn-save{background:linear-gradient(135deg,var(--gold-a),var(--gold-b));color:#2A1E00;}
  .btn-save:disabled{background:#4a4a58;color:#9a9aab;}
  .modal-msg{min-height:18px;font-size:0.82rem;margin-top:10px;color:var(--danger);}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="mesh"><div class="b1"></div><div class="b2"></div><div class="b3"></div><div class="b4"></div></div>
  <div class="login-card">
    <div class="lockwrap" id="loginLock">
      <svg viewBox="0 0 96 96">
        <defs>
          <linearGradient id="lockGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#33D6E8"/>
            <stop offset="55%" stop-color="#7B4DFF"/>
            <stop offset="100%" stop-color="#D24FE0"/>
          </linearGradient>
        </defs>
        <g class="ring-spin">
          <circle cx="48" cy="48" r="44" fill="none" stroke="url(#lockGrad)" stroke-width="1.6" opacity="0.55"/>
          <circle cx="48" cy="48" r="38" fill="none" stroke="url(#lockGrad)" stroke-width="1.2" stroke-dasharray="2 7" opacity="0.7"/>
        </g>
        <circle cx="48" cy="48" r="27" fill="url(#lockGrad)" opacity="0.92"/>
        <ellipse cx="40" cy="35" rx="12" ry="6" fill="rgba(255,255,255,0.35)"/>
        <g class="shackle">
          <path d="M40 44 v-7 a8 8 0 0 1 16 0 v7" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
        </g>
        <rect x="36" y="44" width="24" height="18" rx="4" fill="#fff" opacity="0.92"/>
        <circle cx="48" cy="52" r="2.6" fill="#3a2a70"/>
      </svg>
    </div>
    <h1 class="brand-title serif">CertVault</h1>
    <p class="brand-sub ml">നിന്റെ സ്വകാര്യ സർട്ടിഫിക്കറ്റ് ലോക്കർ</p>

    <label class="field-label">Secret Code</label>
    <input type="password" id="secretCode" class="code-input" placeholder="●●●●●●●●" autocomplete="off">

    <div class="recaptcha-wrap">
      <div class="g-recaptcha" data-sitekey="6LdfkUAtAAAAALkBMd_WQGu6LgK2wP1849Oiz3iL"></div>
    </div>

    <button class="unlock-btn" id="unlockBtn">Unlock Vault</button>
    <div class="login-msg" id="loginMsg"></div>
    <p class="footer-note">Private access only</p>
  </div>
</div>

<!-- ============ DASHBOARD SCREEN ============ -->
<div id="dashScreen">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="vault-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="18" height="11" rx="2" stroke="#fff" stroke-width="1.6"/><path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="#fff" stroke-width="1.6"/><circle cx="12" cy="15" r="1.6" fill="#fff"/></svg></div>
      <span class="serif">CertVault</span>
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <div class="content">
    <div class="section-label">Manage Records For</div>
    <div class="people-row" id="peopleRow"></div>

    <div id="docsSection">
      <div class="section-label" id="docsHeading">Documents</div>
      <div class="chips" id="chips">
        <div class="chip active" data-cat="All">All</div>
        <div class="chip" data-cat="SSLC">SSLC</div>
        <div class="chip" data-cat="Plus Two">Plus Two</div>
        <div class="chip" data-cat="Degree">Degree</div>
        <div class="chip" data-cat="ID Proof">ID Proof</div>
        <div class="chip" data-cat="Other">Other</div>
      </div>
      <div class="doc-grid" id="docGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="lockwrap"><svg viewBox="0 0 96 96"><circle cx="48" cy="48" r="27" fill="#3a3f66"/><rect x="36" y="44" width="24" height="18" rx="4" fill="#8a90ac"/></svg></div>
        <p id="emptyText">No documents yet.<br>Tap + to add.</p>
      </div>
    </div>
  </div>

  <button class="fab" id="fabAdd">+</button>
</div>

<!-- ============ ADD PERSON MODAL ============ -->
<div class="modal-overlay" id="personModal">
  <div class="modal">
    <h3>Add Person</h3>
    <label>Name</label>
    <input type="text" id="personName" placeholder="e.g. Reji T.B">
    <div class="modal-msg" id="personModalMsg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelPerson">Cancel</button>
      <button class="btn-save" id="savePerson">Add</button>
    </div>
  </div>
</div>

<!-- ============ UPLOAD MODAL ============ -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h3>Add Document</h3>
    <label>Name</label>
    <input type="text" id="docName" placeholder="e.g. SSLC Marksheet">
    <label>Category</label>
    <select id="docCat">
      <option>SSLC</option>
      <option>Plus Two</option>
      <option>Degree</option>
      <option>ID Proof</option>
      <option>Other</option>
    </select>
    <label>File</label>
    <div class="file-drop" id="fileDrop">Tap to choose a PDF or image (max 10MB)</div>
    <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none;">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelUpload">Cancel</button>
      <button class="btn-save" id="saveUpload">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://ourvffmmahggqxfbuxlo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6DyIU5rOoWiGYt6hQDDjTw_JLSxKC2w';
const LOGIN_EMAIL  = 'aravind.certvault@gmail.com';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const BUCKET = 'documents';

const loginScreen = document.getElementById('loginScreen');
const dashScreen  = document.getElementById('dashScreen');
const secretCode  = document.getElementById('secretCode');
const unlockBtn   = document.getElementById('unlockBtn');
const loginMsg    = document.getElementById('loginMsg');
const loginLock   = document.getElementById('loginLock');
const peopleRow   = document.getElementById('peopleRow');
const docGrid     = document.getElementById('docGrid');
const emptyState  = document.getElementById('emptyState');
const emptyText   = document.getElementById('emptyText');
const docsHeading = document.getElementById('docsHeading');
const chips       = document.querySelectorAll('.chip');
const fab         = document.getElementById('fabAdd');
const uploadModal = document.getElementById('uploadModal');
const fileDrop    = document.getElementById('fileDrop');
const fileInput   = document.getElementById('fileInput');
const saveUpload  = document.getElementById('saveUpload');
const cancelUpload= document.getElementById('cancelUpload');
const modalMsg    = document.getElementById('modalMsg');
const docNameEl   = document.getElementById('docName');
const docCatEl    = document.getElementById('docCat');
const logoutBtn   = document.getElementById('logoutBtn');
const personModal = document.getElementById('personModal');
const personName  = document.getElementById('personName');
const savePerson  = document.getElementById('savePerson');
const cancelPerson= document.getElementById('cancelPerson');
const personModalMsg = document.getElementById('personModalMsg');

let activeCat = 'All';
let allDocs = [];
let allPeople = [];
let activePersonId = null;
let chosenFile = null;

const LOCK_KEY='cv_lock_until', FAIL_KEY='cv_fail_count';
function isLocked(){ return Date.now() < parseInt(localStorage.getItem(LOCK_KEY)||'0',10); }
function remainingLockMins(){ return Math.ceil((parseInt(localStorage.getItem(LOCK_KEY)||'0',10)-Date.now())/60000); }
function registerFail(){
  const n=parseInt(localStorage.getItem(FAIL_KEY)||'0',10)+1;
  localStorage.setItem(FAIL_KEY,n);
  if(n>=5){ localStorage.setItem(LOCK_KEY, Date.now()+15*60*1000); localStorage.setItem(FAIL_KEY,'0'); }
}
function clearFails(){ localStorage.setItem(FAIL_KEY,'0'); localStorage.removeItem(LOCK_KEY); }
function checkLockUI(){
  if(isLocked()){ unlockBtn.disabled=true; loginMsg.textContent=`വളരെ പല തവണ തെറ്റായ ശ്രമം. ${remainingLockMins()} മിനിറ്റ് കഴിഞ്ഞ് ശ്രമിക്കുക.`; }
}
checkLockUI();
setInterval(checkLockUI,15000);

unlockBtn.addEventListener('click', async () => {
  loginMsg.className='login-msg';
  if(isLocked()){ checkLockUI(); return; }
  const code = secretCode.value.trim();
  if(!code){ loginMsg.textContent='Secret code enter ചെയ്യുക.'; return; }
  const captchaResp = (typeof grecaptcha !== 'undefined') ? grecaptcha.getResponse() : '';
  if(!captchaResp){ loginMsg.textContent='reCAPTCHA verify ചെയ്യുക.'; return; }

  unlockBtn.disabled=true; unlockBtn.textContent='Verifying...';
  const { error } = await sb.auth.signInWithPassword({ email: LOGIN_EMAIL, password: code });
  unlockBtn.disabled=false; unlockBtn.textContent='Unlock Vault';

  if(error){
    registerFail();
    if(typeof grecaptcha !== 'undefined') grecaptcha.reset();
    loginMsg.textContent='തെറ്റായ code. വീണ്ടും ശ്രമിക്കുക.';
    checkLockUI();
    return;
  }
  clearFails();
  loginMsg.className='login-msg ok';
  loginMsg.textContent='Unlocked!';
  loginLock.classList.add('unlocked');
  setTimeout(showDashboard, 450);
});
secretCode.addEventListener('keydown', e => { if(e.key==='Enter') unlockBtn.click(); });

async function initSession(){
  const { data } = await sb.auth.getSession();
  if(data.session){ showDashboard(); }
}
initSession();

logoutBtn.addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

async function showDashboard(){
  loginScreen.style.display='none';
  dashScreen.style.display='block';
  await loadAll();
}

async function loadAll(){
  const [{data:people,error:pErr}, {data:docs,error:dErr}] = await Promise.all([
    sb.from('people').select('*').order('created_at',{ascending:true}),
    sb.from('documents').select('*').order('uploaded_at',{ascending:false})
  ]);
  if(pErr) console.error(pErr);
  if(dErr) console.error(dErr);
  allPeople = people || [];
  allDocs = docs || [];
  if(!activePersonId && allPeople.length){ activePersonId = allPeople[0].id; }
  renderPeople();
  renderDocs();
}

function docCountFor(personId){ return allDocs.filter(d=>d.person_id===personId).length; }

function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

function renderPeople(){
  peopleRow.innerHTML='';
  allPeople.forEach(p=>{
    const card=document.createElement('div');
    card.className='person-card'+(p.id===activePersonId?' active':'');
    card.innerHTML=`
      <div class="avatar"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="currentColor"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="currentColor"/></svg></div>
      <div class="pname">${escapeHtml(p.name)}</div>
      <div class="pcount">${docCountFor(p.id)} documents</div>
    `;
    card.addEventListener('click', ()=>{ activePersonId=p.id; activeCat='All'; chips.forEach(c=>c.classList.toggle('active', c.dataset.cat==='All')); renderPeople(); renderDocs(); });
    peopleRow.appendChild(card);
  });
  const addCard=document.createElement('div');
  addCard.className='person-card add-card';
  addCard.innerHTML=`<div class="plus">+</div><div class="pname">Add Person</div>`;
  addCard.addEventListener('click', ()=>{ personName.value=''; personModalMsg.textContent=''; personModal.classList.add('open'); });
  peopleRow.appendChild(addCard);
}

chips.forEach(chip=>{
  chip.addEventListener('click', ()=>{
    chips.forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeCat=chip.dataset.cat;
    renderDocs();
  });
});

function renderDocs(){
  const person = allPeople.find(p=>p.id===activePersonId);
  docsHeading.textContent = person ? `${person.name}'s Documents` : 'Documents';
  emptyText.innerHTML = person ? 'No documents yet.<br>Tap + to add.' : 'ആദ്യം ഒരു person add ചെയ്യുക.<br>പിന്നെ documents upload ചെയ്യാം.';

  let filtered = allDocs.filter(d=>d.person_id===activePersonId);
  if(activeCat!=='All') filtered = filtered.filter(d=>d.category===activeCat);
  docGrid.innerHTML='';
  emptyState.style.display = filtered.length ? 'none' : 'block';

  filtered.forEach(doc=>{
    const isPdf = doc.file_path.toLowerCase().endsWith('.pdf');
    const card=document.createElement('div');
    card.className='doc-card';
    card.innerHTML=`
      <div class="doc-top">
        <div class="file-badge ${isPdf?'pdf':'img'}">
          ${isPdf
            ? '<svg viewBox="0 0 24 24" fill="none"><path d="M6 2h9l5 5v15H6z" stroke="#fff" stroke-width="1.5"/><text x="8" y="16" font-size="6" fill="#fff">PDF</text></svg>'
            : '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="#fff" stroke-width="1.5"/><circle cx="9" cy="10" r="1.6" fill="#fff"/><path d="M4 17l5-5 4 4 3-3 4 4" stroke="#fff" stroke-width="1.5"/></svg>'}
        </div>
        <div class="doc-info">
          <div class="doc-name">${escapeHtml(doc.name)}</div>
          <div class="doc-meta">${new Date(doc.uploaded_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
          <span class="doc-cat">${escapeHtml(doc.category)}</span>
        </div>
      </div>
      <div class="doc-actions">
        <button class="view-btn">View</button>
        <button class="danger del-btn">Delete</button>
      </div>
    `;
    card.querySelector('.view-btn').addEventListener('click', ()=>viewDoc(doc));
    card.querySelector('.del-btn').addEventListener('click', ()=>deleteDoc(doc));
    docGrid.appendChild(card);
  });
}

async function viewDoc(doc){
  const { data, error } = await sb.storage.from(BUCKET).createSignedUrl(doc.file_path, 60);
  if(error){ alert('File open ചെയ്യാൻ പറ്റിയില്ല.'); return; }
  window.open(data.signedUrl, '_blank');
}
async function deleteDoc(doc){
  if(!confirm(`"${doc.name}" ഡിലീറ്റ് ചെയ്യണോ?`)) return;
  await sb.storage.from(BUCKET).remove([doc.file_path]);
  await sb.from('documents').delete().eq('id', doc.id);
  await loadAll();
}

/* ---- Add person ---- */
cancelPerson.addEventListener('click', ()=>personModal.classList.remove('open'));
savePerson.addEventListener('click', async ()=>{
  const name = personName.value.trim();
  if(!name){ personModalMsg.textContent='Name enter ചെയ്യുക.'; return; }
  savePerson.disabled=true;
  const { data, error } = await sb.from('people').insert({ name }).select().single();
  savePerson.disabled=false;
  if(error){ personModalMsg.textContent='Save പരാജയപ്പെട്ടു.'; return; }
  personModal.classList.remove('open');
  activePersonId = data.id;
  await loadAll();
});

/* ---- Upload ---- */
fab.addEventListener('click', ()=>{
  if(!activePersonId){ alert('ആദ്യം ഒരു person add ചെയ്യുക.'); return; }
  docNameEl.value=''; docCatEl.value='SSLC'; chosenFile=null;
  fileDrop.textContent='Tap to choose a PDF or image (max 10MB)';
  fileDrop.classList.remove('has-file');
  modalMsg.textContent='';
  uploadModal.classList.add('open');
});
cancelUpload.addEventListener('click', ()=>uploadModal.classList.remove('open'));
fileDrop.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', ()=>{
  const f=fileInput.files[0]; if(!f) return;
  if(f.size>10*1024*1024){ modalMsg.textContent='File 10MB-ൽ താഴെ ആയിരിക്കണം.'; return; }
  chosenFile=f; fileDrop.textContent=f.name; fileDrop.classList.add('has-file'); modalMsg.textContent='';
});
saveUpload.addEventListener('click', async ()=>{
  const name=docNameEl.value.trim(), category=docCatEl.value;
  if(!name){ modalMsg.textContent='Document name enter ചെയ്യുക.'; return; }
  if(!chosenFile){ modalMsg.textContent='ഒരു file select ചെയ്യുക.'; return; }
  saveUpload.disabled=true; saveUpload.textContent='Uploading...';
  const ext=chosenFile.name.split('.').pop();
  const path=`${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await sb.storage.from(BUCKET).upload(path, chosenFile);
  if(upErr){ modalMsg.textContent='Upload പരാജയപ്പെട്ടു.'; saveUpload.disabled=false; saveUpload.textContent='Save'; return; }
  const { error: insErr } = await sb.from('documents').insert({ name, category, file_path: path, person_id: activePersonId });
  saveUpload.disabled=false; saveUpload.textContent='Save';
  if(insErr){ modalMsg.textContent='Save പരാജയപ്പെട്ടു.'; return; }
  uploadModal.classList.remove('open');
  await loadAll();
});
</script>
</body>
</html>
